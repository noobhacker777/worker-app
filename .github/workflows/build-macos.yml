name: Build macOS App

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          ver
          uname -a
          python -m pip install --upgrade pip
          pip install --upgrade py2app
          pip install pillow pystray python-dotenv requests mss

      - name: Build .app with py2app
        run: |
          python setup.py py2app
          ls -la dist/*.app 2>&1 || echo "Build may have failed"

      - name: Verify build output
        run: |
          ls -la dist/ 2>&1 || echo "dist/ not found"
          find dist -name "*.app" -type d 2>&1 || echo "No .app found"

      - name: Create DMG
        run: |
          APP_PATH=$(find dist -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi
          DMG_NAME="Worker-$(date +%Y%m%d)"
          hdiutil create -volname "Worker" -srcfolder "$APP_PATH" -ov -format UDZO "dist/${DMG_NAME}.dmg"
          ls -la dist/*.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Worker-macos
          path: dist/
          retention-days: 7